<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>Yhteinen kalenteri 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg: #111;
      --panel: #1c1c1c;
      --panel-2: #181818;
      --line: #333;
      --text: #fff;
      --muted: #9d9d9d;
      --accent: #2b2b2b;
      --today: #2a2a2a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 20px 20px 10px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
    }

    .year-wrap {
      padding: 8px 14px 24px;
      display: grid;
      grid-template-columns: repeat(3, minmax(280px, 1fr));
      gap: 16px;
    }

    .month {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      min-width: 0;
    }

    .month-title {
      padding: 12px 14px;
      font-size: 18px;
      font-weight: 700;
      border-bottom: 1px solid var(--line);
      background: #171717;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid var(--line);
      background: #151515;
    }

    .weekday {
      padding: 8px 6px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      border-right: 1px solid var(--line);
    }

    .weekday:last-child {
      border-right: 0;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .day,
    .empty-day {
      min-height: 118px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 6px;
    }

    .days > *:nth-child(7n) {
      border-right: 0;
    }

    .empty-day {
      background: #141414;
    }

    .day {
      background: var(--panel);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .day.today {
      background: var(--today);
    }

    .day-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .day-number {
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }

    .date-small {
      font-size: 10px;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 72px;
      flex: 1;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: #fff;
      font-size: 12px;
      line-height: 1.35;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    textarea::placeholder {
      color: #666;
    }

    .saving {
      font-size: 10px;
      color: var(--muted);
      min-height: 12px;
    }

    @media (max-width: 1100px) {
      .year-wrap {
        grid-template-columns: repeat(2, minmax(280px, 1fr));
      }
    }

    @media (max-width: 720px) {
      .year-wrap {
        grid-template-columns: 1fr;
      }

      .day,
      .empty-day {
        min-height: 100px;
      }

      textarea {
        min-height: 58px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>Yhteinen kalenteri 2026</h1>
  <div class="sub">Kaikki näkevät ja voivat muokata samoja merkintöjä.</div>
</header>

<div class="year-wrap" id="calendar"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA_k_wo5Fuehs40B26aN20BVu8rY8DijQI",
    authDomain: "nilsu-f053a.firebaseapp.com",
    databaseURL: "https://nilsu-f053a-default-rtdb.firebaseio.com",
    projectId: "nilsu-f053a",
    storageBucket: "nilsu-f053a.firebasestorage.app",
    messagingSenderId: "225502883063",
    appId: "1:225502883063:web:72e5020f48d1e45e8177f2"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const calendarEl = document.getElementById("calendar");

  const monthsFi = [
    "Tammikuu", "Helmikuu", "Maaliskuu", "Huhtikuu",
    "Toukokuu", "Kesäkuu", "Heinäkuu", "Elokuu",
    "Syyskuu", "Lokakuu", "Marraskuu", "Joulukuu"
  ];

  const weekdaysFi = ["Ma", "Ti", "Ke", "To", "Pe", "La", "Su"];
  const year = 2026;

  function pad(num) {
    return String(num).padStart(2, "0");
  }

  function formatDate(year, monthIndex, day) {
    return `${year}-${pad(monthIndex + 1)}-${pad(day)}`;
  }

  function getMondayFirstIndex(jsDay) {
    return (jsDay + 6) % 7;
  }

  function debounce(fn, delay) {
    let timeout;
    return (...args) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => fn(...args), delay);
    };
  }

  function createMonth(monthIndex) {
    const monthEl = document.createElement("section");
    monthEl.className = "month";

    const titleEl = document.createElement("div");
    titleEl.className = "month-title";
    titleEl.textContent = monthsFi[monthIndex];

    const weekdaysEl = document.createElement("div");
    weekdaysEl.className = "weekdays";

    weekdaysFi.forEach(day => {
      const w = document.createElement("div");
      w.className = "weekday";
      w.textContent = day;
      weekdaysEl.appendChild(w);
    });

    const daysEl = document.createElement("div");
    daysEl.className = "days";

    const firstDay = new Date(year, monthIndex, 1);
    const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
    const leadingEmpty = getMondayFirstIndex(firstDay.getDay());

    for (let i = 0; i < leadingEmpty; i++) {
      const empty = document.createElement("div");
      empty.className = "empty-day";
      daysEl.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = formatDate(year, monthIndex, day);
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;

      const dayEl = document.createElement("div");
      dayEl.className = "day";
      if (dateStr === todayStr) dayEl.classList.add("today");

      const headEl = document.createElement("div");
      headEl.className = "day-head";

      const dayNumberEl = document.createElement("div");
      dayNumberEl.className = "day-number";
      dayNumberEl.textContent = day;

      const dateSmallEl = document.createElement("div");
      dateSmallEl.className = "date-small";
      dateSmallEl.textContent = `${pad(monthIndex + 1)}-${pad(day)}`;

      headEl.appendChild(dayNumberEl);
      headEl.appendChild(dateSmallEl);

      const textarea = document.createElement("textarea");
      textarea.placeholder = "Kirjoita…";

      const savingEl = document.createElement("div");
      savingEl.className = "saving";

      let isUpdatingFromFirebase = false;

      db.ref("calendar/" + dateStr).on("value", snap => {
        const newValue = snap.exists() ? snap.val() : "";
        if (textarea.value !== newValue) {
          isUpdatingFromFirebase = true;
          textarea.value = newValue;
          isUpdatingFromFirebase = false;
        }
        savingEl.textContent = "";
      });

      const saveToFirebase = debounce((value) => {
        db.ref("calendar/" + dateStr).set(value);
        savingEl.textContent = "Tallennettu";
        setTimeout(() => {
          if (savingEl.textContent === "Tallennettu") {
            savingEl.textContent = "";
          }
        }, 1200);
      }, 350);

      textarea.addEventListener("input", () => {
        if (isUpdatingFromFirebase) return;
        savingEl.textContent = "Tallentuu…";
        saveToFirebase(textarea.value);
      });

      dayEl.appendChild(headEl);
      dayEl.appendChild(textarea);
      dayEl.appendChild(savingEl);
      daysEl.appendChild(dayEl);
    }

    const totalCells = leadingEmpty + daysInMonth;
    const trailingEmpty = (7 - (totalCells % 7)) % 7;

    for (let i = 0; i < trailingEmpty; i++) {
      const empty = document.createElement("div");
      empty.className = "empty-day";
      daysEl.appendChild(empty);
    }

    monthEl.appendChild(titleEl);
    monthEl.appendChild(weekdaysEl);
    monthEl.appendChild(daysEl);

    return monthEl;
  }

  for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
    calendarEl.appendChild(createMonth(monthIndex));
  }
</script>

</body>
</html>
