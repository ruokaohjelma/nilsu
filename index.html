<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>NILSU KALENTERI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style>
    :root{
      --bg:#ff0000;
      --panel:#1c1c1c;
      --panel-2:#181818;
      --line:#333;
      --text:#fff;
      --muted:#d9d9d9;
      --today:#0050ff;
    }

    *{
      box-sizing:border-box;
      border-radius:0!important;
      text-transform:uppercase;
      font-style:italic;
      font-family:"Arial Narrow", Arial, sans-serif;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
    }

    header{
      text-align:center;
      padding:14px 10px 10px;
    }

    h1{
      margin:0;
      font-size:clamp(22px,5vw,34px);
      line-height:1;
      font-weight:700;
    }

    .sub{
      margin-top:6px;
      font-size:clamp(10px,2.4vw,15px);
      line-height:1.15;
      font-weight:700;
      color:#fff;
    }

    .all-years{
      width:100%;
      max-width:1500px;
      margin:0 auto;
      padding:4px;
    }

    .year-block{
      margin-bottom:10px;
    }

    .year-title{
      margin:0 0 6px;
      padding:0 2px;
      font-size:clamp(20px,4.2vw,32px);
      line-height:1;
      font-weight:700;
    }

    .year-wrap{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
    }

    .month{
      width:100%;
      border:1px solid var(--line);
      background:var(--panel-2);
      overflow:hidden;
      scroll-margin-top:10px;
    }

    .month-title{
      padding:10px;
      font-size:clamp(16px,4vw,26px);
      line-height:1;
      font-weight:700;
      background:#111;
      border-bottom:1px solid var(--line);
    }

    .weekdays{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      background:#111;
      border-bottom:1px solid var(--line);
    }

    .weekday{
      padding:6px 2px;
      text-align:center;
      font-size:clamp(9px,2.2vw,14px);
      line-height:1;
      font-weight:700;
      color:var(--muted);
      border-right:1px solid var(--line);
      overflow:hidden;
    }

    .weekday:last-child{
      border-right:0;
    }

    .days{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      width:100%;
    }

    .day,
    .empty-day{
      min-height:84px;
      min-width:0;
      border-right:1px solid var(--line);
      border-bottom:1px solid var(--line);
      padding:4px;
    }

    .days > *:nth-child(7n){
      border-right:0;
    }

    .empty-day{
      background:#090909;
    }

    .day{
      background:var(--panel);
      display:flex;
      flex-direction:column;
      gap:4px;
      position:relative;
      overflow:hidden;
    }

    .day.today{
      background:var(--today);
    }

    .day-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      min-height:14px;
    }

    .day-number{
      font-size:clamp(12px,3vw,18px);
      line-height:1;
      font-weight:700;
      flex:0 0 auto;
    }

    textarea{
      width:100%;
      min-height:42px;
      flex:1;
      border:0;
      outline:0;
      resize:none;
      background:transparent;
      color:#fff;
      padding:0;
      font-size:clamp(10px,2.5vw,14px);
      line-height:1.05;
      font-weight:700;
      overflow-wrap:anywhere;
    }

    .saving{
      min-height:10px;
      font-size:9px;
      line-height:1;
      font-weight:700;
      color:#f0f0f0;
    }

    .row-monster{
      position:fixed;
      left:-220px;
      top:0;
      width:190px;
      height:190px;
      pointer-events:none;
      opacity:0;
      z-index:99999;
      filter:
        drop-shadow(0 0 18px rgba(0,0,0,.95))
        drop-shadow(0 0 35px rgba(255,255,255,.14));
      transform-origin:center center;
    }

    .row-monster svg{
      width:100%;
      height:100%;
      display:block;
    }

    .row-monster.run{
      animation:row-monster-run 1.35s linear forwards;
    }

    @keyframes row-monster-run{
      0%{
        left:-220px;
        opacity:0;
        transform:translateY(-50%) scale(.9) rotate(-6deg);
      }
      6%{
        opacity:1;
      }
      50%{
        transform:translateY(-50%) scale(1.04) rotate(2deg);
      }
      100%{
        left:calc(100vw + 220px);
        opacity:0;
        transform:translateY(-50%) scale(1) rotate(-2deg);
      }
    }

    .monster-hit{
      animation:monster-hit .55s steps(2,end);
    }

    @keyframes monster-hit{
      0%{opacity:1; transform:translateX(0);}
      16%{opacity:.08; transform:translateX(-3px);}
      32%{opacity:1; transform:translateX(3px);}
      48%{opacity:.16; transform:translateX(-2px);}
      64%{opacity:1; transform:translateX(2px);}
      80%{opacity:.3; transform:translateX(-1px);}
      100%{opacity:1; transform:translateX(0);}
    }

    @media (min-width:700px){
      .all-years{
        padding:6px;
      }

      .day,
      .empty-day{
        min-height:120px;
        padding:5px;
      }

      textarea{
        min-height:70px;
      }

      .saving{
        font-size:10px;
      }
    }

    @media (min-width:1100px){
      .day,
      .empty-day{
        min-height:160px;
        padding:6px;
      }

      textarea{
        min-height:100px;
      }

      .saving{
        font-size:11px;
      }
    }

    @media (max-width:640px){
      .all-years{
        padding:2px;
      }

      .month{
        border-left:0;
        border-right:0;
      }

      .month-title{
        padding:8px;
      }

      .weekday{
        padding:5px 1px;
      }

      .day,
      .empty-day{
        min-height:74px;
        padding:3px;
      }

      textarea{
        min-height:34px;
      }

      .saving{
        font-size:8px;
      }

      .row-monster{
        width:140px;
        height:140px;
        left:-170px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>NILSU KALENTERI</h1>
  <div class="sub">RUUTUUN VAIN NIMI JA AIKA ESIM "JOUNI 12-19" TAI "SARI KOKO PÄIVÄ"</div>
</header>

<div class="all-years" id="calendar"></div>
<div class="row-monster" id="rowMonster" aria-hidden="true"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA_k_wo5Fuehs40B26aN20BVu8rY8DijQI",
    authDomain: "nilsu-f053a.firebaseapp.com",
    databaseURL: "https://nilsu-f053a-default-rtdb.firebaseio.com",
    projectId: "nilsu-f053a",
    storageBucket: "nilsu-f053a.firebasestorage.app",
    messagingSenderId: "225502883063",
    appId: "1:225502883063:web:72e5020f48d1e45e8177f2"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const calendarEl = document.getElementById("calendar");
  const rowMonsterEl = document.getElementById("rowMonster");

  rowMonsterEl.innerHTML = `
    <svg viewBox="0 0 240 180" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="fur" x1="0" x2="1">
          <stop offset="0%" stop-color="#9a9a9a"/>
          <stop offset="50%" stop-color="#6d6d6d"/>
          <stop offset="100%" stop-color="#4f4f4f"/>
        </linearGradient>
        <linearGradient id="jaw" x1="0" x2="1">
          <stop offset="0%" stop-color="#dcdcdc"/>
          <stop offset="100%" stop-color="#7b7b7b"/>
        </linearGradient>
      </defs>

      <path d="M18 116 C26 79, 67 52, 112 49 C160 46, 205 66, 222 96 C229 108, 231 121, 224 132 C215 146, 194 153, 164 154 L74 154 C42 154, 18 141, 18 116 Z"
            fill="url(#fur)"/>

      <path d="M185 68 L224 47 L206 82 Z" fill="#7b7b7b"/>
      <path d="M197 54 L215 46 L206 62 Z" fill="#d6d6d6"/>

      <path d="M55 70 L29 35 L74 56 Z" fill="#7b7b7b"/>
      <path d="M48 50 L36 38 L53 44 Z" fill="#d6d6d6"/>

      <ellipse cx="171" cy="94" rx="36" ry="28" fill="#555"/>
      <ellipse cx="173" cy="94" rx="22" ry="18" fill="#1a1a1a"/>
      <circle cx="178" cy="88" r="6" fill="#ff1d1d"/>
      <circle cx="180" cy="86" r="2" fill="#fff"/>

      <path d="M103 86 C145 70, 181 72, 213 95 C198 112, 178 122, 145 125 C111 127, 83 120, 58 104 Z"
            fill="#2f2f2f"/>

      <path d="M96 91 C131 78, 176 81, 207 97 C192 109, 171 116, 141 118 C112 119, 89 114, 67 104 Z"
            fill="#111"/>

      <path d="M82 98 L104 88 L102 112 Z" fill="url(#jaw)"/>
      <path d="M102 88 L126 82 L121 116 Z" fill="#efefef"/>
      <path d="M126 82 L151 81 L143 118 Z" fill="#dadada"/>
      <path d="M151 81 L175 85 L164 118 Z" fill="#efefef"/>
      <path d="M175 85 L197 94 L181 119 Z" fill="#d0d0d0"/>

      <path d="M70 111 L89 101 L87 124 Z" fill="#fafafa"/>
      <path d="M90 101 L111 95 L107 127 Z" fill="#f0f0f0"/>
      <path d="M111 95 L134 92 L128 127 Z" fill="#ffffff"/>
      <path d="M134 92 L156 95 L149 126 Z" fill="#ededed"/>
      <path d="M156 95 L179 103 L166 124 Z" fill="#fafafa"/>

      <path d="M45 137 L28 174 L44 174 L60 141 Z" fill="#474747"/>
      <path d="M78 143 L64 179 L82 179 L96 145 Z" fill="#565656"/>
      <path d="M143 145 L157 179 L176 179 L160 142 Z" fill="#4d4d4d"/>
      <path d="M183 137 L203 174 L220 174 L199 133 Z" fill="#565656"/>

      <path d="M42 103 C33 103, 24 108, 21 116 C35 116, 47 112, 58 105 Z" fill="#8f8f8f"/>
      <path d="M117 58 C133 54, 150 54, 166 57" stroke="#b9b9b9" stroke-width="4" fill="none" stroke-linecap="round"/>
    </svg>
  `;

  const monthsFi = [
    "TAMMIKUU", "HELMIKUU", "MAALISKUU", "HUHTIKUU",
    "TOUKOKUU", "KESÄKUU", "HEINÄKUU", "ELOKUU",
    "SYYSKUU", "LOKAKUU", "MARRASKUU", "JOULUKUU"
  ];

  const weekdaysFi = ["MA", "TI", "KE", "TO", "PE", "LA", "SU"];
  const startYear = 2026;
  const endYear = 2029;

  function pad(num) {
    return String(num).padStart(2, "0");
  }

  function formatDate(year, monthIndex, day) {
    return `${year}-${pad(monthIndex + 1)}-${pad(day)}`;
  }

  function getMondayFirstIndex(jsDay) {
    return (jsDay + 6) % 7;
  }

  function debounce(fn, delay) {
    let timeout;
    return (...args) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => fn(...args), delay);
    };
  }

  function maybeTriggerMonster(dayEl, textarea) {
    if (Math.random() >= 0.1) return;

    const rowTop = dayEl.getBoundingClientRect().top + (dayEl.offsetHeight / 2);
    rowMonsterEl.style.top = rowTop + "px";

    rowMonsterEl.classList.remove("run");
    void rowMonsterEl.offsetWidth;
    rowMonsterEl.classList.add("run");

    textarea.classList.remove("monster-hit");
    void textarea.offsetWidth;
    textarea.classList.add("monster-hit");

    setTimeout(() => {
      textarea.classList.remove("monster-hit");
    }, 650);
  }

  function createMonth(year, monthIndex) {
    const monthEl = document.createElement("section");
    monthEl.className = "month";
    monthEl.dataset.year = String(year);
    monthEl.dataset.month = String(monthIndex + 1);

    const titleEl = document.createElement("div");
    titleEl.className = "month-title";
    titleEl.textContent = `${monthsFi[monthIndex]} ${year}`;

    const weekdaysEl = document.createElement("div");
    weekdaysEl.className = "weekdays";

    weekdaysFi.forEach(day => {
      const w = document.createElement("div");
      w.className = "weekday";
      w.textContent = day;
      weekdaysEl.appendChild(w);
    });

    const daysEl = document.createElement("div");
    daysEl.className = "days";

    const firstDay = new Date(year, monthIndex, 1);
    const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
    const leadingEmpty = getMondayFirstIndex(firstDay.getDay());

    for (let i = 0; i < leadingEmpty; i++) {
      const empty = document.createElement("div");
      empty.className = "empty-day";
      daysEl.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = formatDate(year, monthIndex, day);
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;

      const dayEl = document.createElement("div");
      dayEl.className = "day";

      if (dateStr === todayStr) {
        dayEl.classList.add("today");
      }

      const headEl = document.createElement("div");
      headEl.className = "day-head";

      const dayNumberEl = document.createElement("div");
      dayNumberEl.className = "day-number";
      dayNumberEl.textContent = day;

      headEl.appendChild(dayNumberEl);

      const textarea = document.createElement("textarea");
      const savingEl = document.createElement("div");
      savingEl.className = "saving";

      let isUpdatingFromFirebase = false;

      db.ref("calendar/" + dateStr).on("value", snap => {
        const newValue = snap.exists() ? snap.val() : "";
        if (textarea.value !== newValue) {
          isUpdatingFromFirebase = true;
          textarea.value = newValue;
          isUpdatingFromFirebase = false;
        }
        savingEl.textContent = "";
      });

      const saveToFirebase = debounce((value) => {
        db.ref("calendar/" + dateStr).set(value);
        savingEl.textContent = "TALLENNETTU";
        setTimeout(() => {
          if (savingEl.textContent === "TALLENNETTU") {
            savingEl.textContent = "";
          }
        }, 1200);
      }, 350);

      textarea.addEventListener("input", () => {
        if (isUpdatingFromFirebase) return;
        savingEl.textContent = "TALLENTUU...";
        maybeTriggerMonster(dayEl, textarea);
        saveToFirebase(textarea.value);
      });

      dayEl.appendChild(headEl);
      dayEl.appendChild(textarea);
      dayEl.appendChild(savingEl);
      daysEl.appendChild(dayEl);
    }

    const totalCells = leadingEmpty + daysInMonth;
    const trailingEmpty = (7 - (totalCells % 7)) % 7;

    for (let i = 0; i < trailingEmpty; i++) {
      const empty = document.createElement("div");
      empty.className = "empty-day";
      daysEl.appendChild(empty);
    }

    monthEl.appendChild(titleEl);
    monthEl.appendChild(weekdaysEl);
    monthEl.appendChild(daysEl);

    return monthEl;
  }

  function createYear(year) {
    const yearBlock = document.createElement("section");
    yearBlock.className = "year-block";

    const yearTitle = document.createElement("h2");
    yearTitle.className = "year-title";
    yearTitle.textContent = year;

    const yearWrap = document.createElement("div");
    yearWrap.className = "year-wrap";

    for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
      yearWrap.appendChild(createMonth(year, monthIndex));
    }

    yearBlock.appendChild(yearTitle);
    yearBlock.appendChild(yearWrap);

    return yearBlock;
  }

  for (let year = startYear; year <= endYear; year++) {
    calendarEl.appendChild(createYear(year));
  }

  function scrollToCurrentMonth() {
    const today = new Date();
    const target = document.querySelector(
      `.month[data-year="${today.getFullYear()}"][data-month="${today.getMonth() + 1}"]`
    );

    if (!target) return;

    requestAnimationFrame(() => {
      target.scrollIntoView({
        behavior: "auto",
        block: "start"
      });
    });
  }

  window.addEventListener("load", scrollToCurrentMonth);
</script>

</body>
</html>
