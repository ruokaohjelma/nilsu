<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <title>NILSU KALENTERI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg: #151;
      --panel: #1c1c1c;
      --panel-2: #181818;
      --line: #333;
      --text: #fff;
      --muted: #9d9d9d;
      --today: #2a2a2a;
    }

    * {
      box-sizing: border-box;
      border-radius: 0 !important;
      text-transform: uppercase;
      font-style: italic;
      font-family: "Arial Narrow", Arial, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    header {
      padding: 20px 20px 10px;
  text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1;
      font-weight: 700;
      font-style: italic;
      font-family: "Arial Narrow", Arial, sans-serif;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.2;
      font-weight: 700;
      font-style: italic;
      font-family: "Arial Narrow", Arial, sans-serif;
    }

    .all-years {
      max-width: 1400px;
      margin: 0 auto;
      padding: 10px 16px 30px;
    }

    .year-block {
      margin-bottom: 26px;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .year-title {
      font-size: 34px;
      line-height: 1;
      font-weight: 700;
      margin: 0 0 14px;
      color: #fff;
    }

    .year-wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .month {
      background: var(--panel-2);
      border: 1px solid var(--line);
      overflow: hidden;
      min-width: 0;
    }

    .month-title {
      padding: 14px 16px;
      font-size: 28px;
      font-weight: 700;
      font-style: italic;
      font-family: "Arial Narrow", Arial, sans-serif;
      border-bottom: 1px solid var(--line);
      background: #171717;
      line-height: 1;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 1px solid var(--line);
      background: #151515;
    }

    .weekday {
      padding: 10px 6px;
      text-align: center;
      font-size: 18px;
      color: var(--muted);
      border-right: 1px solid var(--line);
      font-weight: 700;
      font-style: italic;
      font-family: "Arial Narrow", Arial, sans-serif;
      line-height: 1;
    }

    .weekday:last-child {
      border-right: 0;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .day,
    .empty-day {
      min-height: 180px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 8px;
    }

    .days > *:nth-child(7n) {
      border-right: 0;
    }

    .empty-day {
      background: #141414;
    }

    .day {
      background: var(--panel);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .day.today {
      background: var(--today);
    }

    .day-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .day-number {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      font-style: italic;
      font-family: "Arial Narrow", Arial, sans-serif;
    }

    .date-small {
      font-size: 14px;
      color: var(--muted);
      line-height: 1;
      font-weight: 700;
      font-style: italic;
      font-family: "Arial Narrow", Arial, sans-serif;
    }

    textarea {
      width: 100%;
      min-height: 124px;
      flex: 1;
      resize: none;
      border: 0;
      outline: 0;
      background: transparent;
      color: #fff;
      font-size: 18px;
      line-height: 1.15;
      padding: 0;
      font-weight: 700;
      font-style: italic;
      font-family: "Arial Narrow", Arial, sans-serif;
    }

    .saving {
      font-size: 12px;
      color: var(--muted);
      min-height: 14px;
      line-height: 1;
      font-weight: 700;
      font-style: italic;
      font-family: "Arial Narrow", Arial, sans-serif;
    }

    @media (max-width: 900px) {
      .year-title {
        font-size: 26px;
      }

      .month-title {
        font-size: 22px;
      }

      .weekday {
        font-size: 15px;
      }

      .day,
      .empty-day {
        min-height: 130px;
      }

      .day-number {
        font-size: 18px;
      }

      .date-small {
        font-size: 11px;
      }

      textarea {
        min-height: 84px;
        font-size: 14px;
      }
    }

    @media (max-width: 640px) {
      header {
        padding: 16px 12px 8px;
      }

      .all-years {
        padding: 8px 8px 20px;
      }

      .year-block {
        margin-bottom: 18px;
        padding-top: 10px;
      }

      .year-title {
        font-size: 22px;
        margin-bottom: 10px;
      }

      .year-wrap {
        gap: 12px;
      }

      .month-title {
        padding: 10px 12px;
        font-size: 18px;
      }

      .weekday {
        padding: 8px 4px;
        font-size: 11px;
      }

      .day,
      .empty-day {
        min-height: 94px;
        padding: 5px;
      }

      .special-420 {
  background: linear-gradient(
    to bottom,
    #009b3a 0%,
    #009b3a 33%,
    #ffdd00 33%,
    #ffdd00 66%,
    #ce1126 66%,
    #ce1126 100%
  );
}

.special-420 textarea,
.special-420 .day-number {
  font-family: "Comic Sans MS", cursive !important;
  color: black !important;
  font-weight: 700;
}
      
      .day-number {
        font-size: 14px;
      }

      .date-small {
        font-size: 9px;
      }

      textarea {
        min-height: 58px;
        font-size: 11px;
      }

      .saving {
        font-size: 9px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>nilsun varaamis kalenteaegrraefdegfrdgrfee</h1>
  <div class="sub">RUUTUUN VAIN NIMI JA AIKA ESIM "JOUNI 12-19" TAI "SARI KOKO PÄIVÄ"</div>
</header>

<div class="all-years" id="calendar"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyA_k_wo5Fuehs40B26aN20BVu8rY8DijQI",
    authDomain: "nilsu-f053a.firebaseapp.com",
    databaseURL: "https://nilsu-f053a-default-rtdb.firebaseio.com",
    projectId: "nilsu-f053a",
    storageBucket: "nilsu-f053a.firebasestorage.app",
    messagingSenderId: "225502883063",
    appId: "1:225502883063:web:72e5020f48d1e45e8177f2"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const calendarEl = document.getElementById("calendar");

  const monthsFi = [
    "TAMMIKUU", "HELMIKUU", "MAALISKUU", "HUHTIKUU",
    "TOUKOKUU", "KESÄKUU", "HEINÄKUU", "ELOKUU",
    "SYYSKUU", "LOKAKUU", "MARRASKUU", "JOULUKUU"
  ];

  const weekdaysFi = ["MA", "TI", "KE", "TO", "PE", "LA", "SU"];
  const startYear = 2026;
  const endYear = 2029;

  function pad(num) {
    return String(num).padStart(2, "0");
  }

  function formatDate(year, monthIndex, day) {
    return `${year}-${pad(monthIndex + 1)}-${pad(day)}`;
  }

  function getMondayFirstIndex(jsDay) {
    return (jsDay + 6) % 7;
  }

  function debounce(fn, delay) {
    let timeout;
    return (...args) => {
      clearTimeout(timeout);
      timeout = setTimeout(() => fn(...args), delay);
    };
  }

  function createMonth(year, monthIndex) {
    const monthEl = document.createElement("section");
    monthEl.className = "month";

    const titleEl = document.createElement("div");
    titleEl.className = "month-title";
    titleEl.textContent = `${monthsFi[monthIndex]} ${year}`;

    const weekdaysEl = document.createElement("div");
    weekdaysEl.className = "weekdays";

    weekdaysFi.forEach(day => {
      const w = document.createElement("div");
      w.className = "weekday";
      w.textContent = day;
      weekdaysEl.appendChild(w);
    });

    const daysEl = document.createElement("div");
    daysEl.className = "days";

    const firstDay = new Date(year, monthIndex, 1);
    const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
    const leadingEmpty = getMondayFirstIndex(firstDay.getDay());

    for (let i = 0; i < leadingEmpty; i++) {
      const empty = document.createElement("div");
      empty.className = "empty-day";
      daysEl.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = formatDate(year, monthIndex, day);
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;

      const dayEl = document.createElement("div");
      dayEl.className = "day";
 
      if (monthIndex === 3 && day === 20) {
  dayEl.classList.add("special-420");
  dayNumberEl.textContent = "420 !!!";
}
      if (dateStr === todayStr) dayEl.classList.add("today");

      const headEl = document.createElement("div");
      headEl.className = "day-head";

      const dayNumberEl = document.createElement("div");
      dayNumberEl.className = "day-number";
      dayNumberEl.textContent = day;

      headEl.appendChild(dayNumberEl);

      const textarea = document.createElement("textarea");
      const savingEl = document.createElement("div");
      savingEl.className = "saving";

      let isUpdatingFromFirebase = false;

      db.ref("calendar/" + dateStr).on("value", snap => {
        const newValue = snap.exists() ? snap.val() : "";
        if (textarea.value !== newValue) {
          isUpdatingFromFirebase = true;
          textarea.value = newValue;
          isUpdatingFromFirebase = false;
        }
        savingEl.textContent = "";
      });

      const saveToFirebase = debounce((value) => {
        db.ref("calendar/" + dateStr).set(value);
        savingEl.textContent = "TALLENNETTU";
        setTimeout(() => {
          if (savingEl.textContent === "TALLENNETTU") {
            savingEl.textContent = "";
          }
        }, 1200);
      }, 350);

      textarea.addEventListener("input", () => {
        if (isUpdatingFromFirebase) return;
        savingEl.textContent = "TALLENTUU...";
        saveToFirebase(textarea.value);
      });

      dayEl.appendChild(headEl);
      dayEl.appendChild(textarea);
      dayEl.appendChild(savingEl);
      daysEl.appendChild(dayEl);
    }

    const totalCells = leadingEmpty + daysInMonth;
    const trailingEmpty = (7 - (totalCells % 7)) % 7;

    for (let i = 0; i < trailingEmpty; i++) {
      const empty = document.createElement("div");
      empty.className = "empty-day";
      daysEl.appendChild(empty);
    }

    monthEl.appendChild(titleEl);
    monthEl.appendChild(weekdaysEl);
    monthEl.appendChild(daysEl);

    return monthEl;
  }

  function createYear(year) {
    const yearBlock = document.createElement("section");
    yearBlock.className = "year-block";

    const yearTitle = document.createElement("h2");
    yearTitle.className = "year-title";
    yearTitle.textContent = year;

    const yearWrap = document.createElement("div");
    yearWrap.className = "year-wrap";

    for (let monthIndex = 0; monthIndex < 12; monthIndex++) {
      yearWrap.appendChild(createMonth(year, monthIndex));
    }

    yearBlock.appendChild(yearTitle);
    yearBlock.appendChild(yearWrap);

    return yearBlock;
  }

  for (let year = startYear; year <= endYear; year++) {
    calendarEl.appendChild(createYear(year));
  }
</script>

</body>
</html>
